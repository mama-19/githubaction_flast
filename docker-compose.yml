services:
  app:
    build: .
    expose:
      - "8000"
    volumes:
      - ./app:/app/app:ro
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/appdb
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    external: true